version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ticket-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: ticket-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
